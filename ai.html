<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coin Flip Game</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 15px;
      opacity: 0.9;
    }

    .choices button {
      padding: 10px 18px;
      margin: 5px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      color: white;
      transition: 0.3s;
    }

    .choices button:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.05);
    }

    .selected {
      background: #00c9a7 !important;
    }

    #flipBtn {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #ffcc00;
      color: #333;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    #flipBtn:hover {
      transform: scale(1.08);
      background: #ffd633;
    }

    #flipBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #coin {
      margin: 25px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700, #b8860b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #333;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.3),
                  0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.7s ease;
    }

    .flip {
      transform: rotateY(1080deg);
    }

    #result {
      margin-top: 10px;
      font-size: 18px;
    }

    #score {
      margin-top: 8px;
      font-size: 16px;
      opacity: 0.9;
    }

    #message {
      margin-top: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .progress {
      margin-top: 15px;
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00c9a7;
      transition: width 0.3s;
    }

    #restartBtn {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      display: none;
    }

    #restartBtn:hover {
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🪙 Coin Flip</h1>
  <p>Pick Heads or Tails</p>

  <div class="choices">
    <button id="headsBtn" onclick="choose('Heads')">Heads</button>
    <button id="tailsBtn" onclick="choose('Tails')">Tails</button>
  </div>

  <button id="flipBtn" onclick="flipCoin()" disabled>Flip Coin</button>

  <div id="coin">?</div>

  <div id="result"></div>
  <div id="score"></div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="message"></div>
  <button id="restartBtn" onclick="restartGame()">Play Again</button>
</div>

<script>
  let userChoice = null;
  let score = 0;
  let attempts = 0;
  const maxAttempts = 10;
  const winScore = 6;

  function choose(choice) {
    userChoice = choice;

    document.getElementById("headsBtn").classList.remove("selected");
    document.getElementById("tailsBtn").classList.remove("selected");

    if (choice === "Heads") {
      document.getElementById("headsBtn").classList.add("selected");
    } else {
      document.getElementById("tailsBtn").classList.add("selected");
    }

    document.getElementById("flipBtn").disabled = false;
  }

  function flipCoin() {
    if (attempts >= maxAttempts) return;

    const coin = document.getElementById("coin");
    coin.classList.remove("flip");
    void coin.offsetWidth;
    coin.classList.add("flip");

    setTimeout(() => {
      const result = Math.random() < 0.5 ? "Heads" : "Tails";
      coin.textContent = result;

      attempts++;

      if (userChoice === result) {
        score++;
        document.getElementById("result").textContent = "✅ Correct!";
      } else {
        document.getElementById("result").textContent = "❌ Wrong!";
      }

      document.getElementById("score").textContent =
        `Score: ${score} / Attempts: ${attempts}`;

      updateProgress();
      checkGameEnd();
    }, 700);
  }

  function updateProgress() {
    const percent = (attempts / maxAttempts) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
  }

  function checkGameEnd() {
    if (attempts === maxAttempts) {
      const message = document.getElementById("message");

      if (score >= winScore) {
        message.textContent = "🎉 You Win!";
      } else {
        message.textContent = "😢 You Lose!";
      }

      document.getElementById("flipBtn").disabled = true;
      document.getElementById("restartBtn").style.display = "inline-block";
    }
  }

  function restartGame() {
    score = 0;
    attempts = 0;
    userChoice = null;

    document.getElementById("coin").textContent = "?";
    document.getElementById("result").textContent = "";
    document.getElementById("score").textContent = "";
    document.getElementById("message").textContent = "";
    document.getElementById("progressBar").style.width = "0%";

    document.getElementById("flipBtn").disabled = true;
    document.getElementById("restartBtn").style.display = "none";

    document.getElementById("headsBtn").classList.remove("selected");
    document.getElementById("tailsBtn").classList.remove("selected");
  }
</script>

</body>
</html>
